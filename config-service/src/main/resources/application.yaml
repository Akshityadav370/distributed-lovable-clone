spring:
  application:
    name: config-service
  profiles:
    active: local
  cloud:
    config.server.git:
      uri: https://github.com/Akshityadav370/distributed-lovable-clone-config-server
      username: Akshityadav370
      default-label: main

server.port: 8888

---

spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false
    config.server.git:
      uri: https://github.com/Akshityadav370/distributed-lovable-clone-config-server
      username: ${GIT_USERNAME}
      password: ${GIT_PASSWORD}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false