# k8s/services/web.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lovable-frontend
  namespace: lovable-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lovable-frontend
  template:
    metadata:
      labels:
        app: lovable-frontend
    spec:
      containers:
        - name: lovable-frontend
          image: akshityadav/lovable-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: lovable-shared-config
                  key: APP_API_BASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 80
            failureThreshold: 10
            periodSeconds: 3
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lovable-frontend
  namespace: lovable-core
spec:
  selector:
    app: lovable-frontend
  ports:
    - port: 80
      targetPort: 80
